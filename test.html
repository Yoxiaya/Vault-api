<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<body>
        <input type="file" id="image">
        <button id="uploadBtn">上传图片1</button>
        <button id="uploadBtn2">上传图片2</button>
        <button id="testBtn">测试</button>
</body>
<script>
    const uploadBtn = document.getElementById('uploadBtn');
    const testBtn = document.getElementById('testBtn');
    uploadBtn.addEventListener('click', async () => {
        const image = document.getElementById('image') ;
        const file = image.files?.[0];
        if (!file) {
            alert('请选择图片');
            return;
        }
        


        const formData = new FormData();
        formData.append('token', '3ce018fd6d56468ca568de8e37b6113d');
        formData.append('file', file);
        axios.post('http://127.0.0.1:8787/vault-accounts/upload-image', formData)
            .then(response => {
                console.log(response.data);
            })
            .catch(error => {
                console.error('上传图片失败:', error);
            });
    });
      uploadBtn2.addEventListener('click', async () => {
            const image = document.getElementById('image');
            const file = image.files?.[0];
            if (!file) {
                alert('请选择图片');
                return;
            }



            const formData = new FormData();
            formData.append('token', '3ce018fd6d56468ca568de8e37b6113d');
            formData.append('file', file);
            axios.post('https://api.superbed.cn/upload', formData)
                .then(response => {
                    console.log(response);
                })
                .catch(error => {
                    console.error('上传图片失败:', error);
                });
        });
    testBtn.addEventListener('click',()=>{
          const image = document.getElementById('image');
        const file = image.files?.[0];
        console.log(file);
    });

   
</script>
</html>
